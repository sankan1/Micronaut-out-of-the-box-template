micronaut:
  application:
    name: demo

datasources:
  default:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:thedb}
    username: ${PG_USERNAME:postgres}
    password: ${PG_PASSWORD:postgres}
    driverClassName: org.postgresql.Driver
jooq:
  datasources:
    default:
      sql-dialect: POSTGRES
unleash:
  api-url: "${UNLEASH_API_URL:`http://localhost:4242/api/`}"
  api-token: "${UNLEASH_API_TOKEN:`*:development.client-token-123`}"
  app-name: "${UNLEASH_APP_NAME:micronaut-out-of-the-box-template}"