openapi: 3.0.3
info:
  title: Example API
  version: 1.0.0
paths:
  /person/{id}:
    get:
      description: Get person by id
      operationId: getPersonById
      tags:
        - Person
      parameters:
        - name: id
          in: query
          required: true
          description: Identificator of the name
          schema:
            type: integer
      responses:
        200:
          description: Returns a person's model by ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonModel'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultErrorResponse'
  /person:
    get:
      description: Get all persons
      operationId: getPersons
      tags:
        - Person
      responses:
        200:
          description: Returns all persons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonsModel'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultErrorResponse'

components:
  schemas:
    PersonModel:
      description: Model containing persons info
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        nickname:
          type: string
    PersonsModel:
      description: List of persons
      type: array
      items:
        $ref: '#/components/schemas/PersonModel'
    DefaultErrorResponse:
      description: Default error
      properties:
        errorMessage:
          type: string