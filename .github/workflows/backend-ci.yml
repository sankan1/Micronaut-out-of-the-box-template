name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # matches database changelog + the committed .env, so
    # :database:update connects with zero overrides - same DB the local
    # docker-compose local-db service provides. pgvector image (not plain
    # postgres) because 18-document-vector.sql runs CREATE EXTENSION vector
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: thedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # NEVER having a migration bug agin brev
      - name: Apply database migrations
        run: ./gradlew :database:update --no-daemon

      # generateJooq runs Liquibase a second time before generating sources, so we don't need to run :database:update again here
      - name: Generate jOOQ sources
        run: ./gradlew generateJooq --no-daemon

      - name: Build and test
        run: ./gradlew build --no-daemon
